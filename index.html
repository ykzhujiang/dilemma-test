<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>你会怎么选？</title>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, "PingFang SC", "Helvetica Neue", sans-serif; background: #0a0a0a; color: #fff; min-height: 100vh; overflow-x: hidden; }

.screen { display: none; min-height: 100vh; padding: 24px 20px; flex-direction: column; align-items: center; justify-content: center; }
.screen.active { display: flex; }

/* Dilemma */
.dilemma-label { font-size: 12px; color: #888; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 16px; }
.dilemma-counter { font-size: 12px; color: #555; margin-bottom: 8px; }
.dilemma-text { font-size: 22px; line-height: 1.6; text-align: center; margin-bottom: 40px; max-width: 320px; font-weight: 500; }
.timer { font-size: 48px; font-weight: 200; color: #ff4444; margin-bottom: 32px; font-variant-numeric: tabular-nums; }
.choices { width: 100%; max-width: 320px; display: flex; flex-direction: column; gap: 16px; }
.choice-btn { background: transparent; border: 1px solid rgba(255,255,255,0.2); color: #fff; padding: 18px 24px; border-radius: 12px; font-size: 17px; cursor: pointer; transition: all 0.3s; text-align: center; -webkit-tap-highlight-color: transparent; }
.choice-btn:active { background: rgba(255,255,255,0.15); border-color: #fff; transform: scale(0.97); }

/* Reveal */
.reveal-container { text-align: center; max-width: 340px; }
.your-choice { font-size: 14px; color: #888; margin-bottom: 8px; }
.reveal-stat { font-size: 56px; font-weight: 700; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 16px 0; }
.reveal-desc { font-size: 16px; color: #bbb; line-height: 1.6; margin-bottom: 12px; }
.expert-take { font-size: 14px; color: #999; font-style: italic; padding: 12px 16px; border-left: 2px solid #764ba2; margin: 20px 0 32px; text-align: left; line-height: 1.6; }
.next-btn { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #fff; border: none; padding: 16px 48px; border-radius: 28px; font-size: 16px; cursor: pointer; }

/* Result Card */
.card-wrapper { width: 100%; max-width: 360px; }
.result-card { border-radius: 20px; padding: 32px 24px; text-align: center; position: relative; overflow: hidden; }
.result-card::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle, rgba(255,255,255,0.06) 0%, transparent 60%); }
.card-type-label { font-size: 11px; letter-spacing: 6px; color: rgba(255,255,255,0.6); margin-bottom: 20px; position: relative; }
.card-rarity { font-size: 13px; color: rgba(255,255,255,0.7); margin-bottom: 12px; position: relative; font-weight: 500; }
.card-type { font-size: 28px; font-weight: 700; margin-bottom: 8px; position: relative; }
.card-color-dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; margin-right: 6px; vertical-align: middle; }
.card-subtitle { font-size: 14px; color: rgba(255,255,255,0.5); margin-bottom: 20px; position: relative; }
.card-desc { font-size: 15px; color: rgba(255,255,255,0.85); line-height: 1.8; position: relative; margin-bottom: 24px; text-align: left; }
.card-color-label { font-size: 13px; position: relative; margin-bottom: 16px; }
.card-footer { font-size: 12px; color: rgba(255,255,255,0.3); position: relative; border-top: 1px solid rgba(255,255,255,0.06); padding-top: 16px; }
.card-share-hook { font-size: 13px; color: rgba(255,255,255,0.5); margin-top: 8px; font-style: italic; position: relative; }

.share-actions { margin-top: 24px; display: flex; flex-direction: column; gap: 12px; align-items: center; }
.share-btn { color: #fff; border: none; padding: 14px 40px; border-radius: 28px; font-size: 15px; cursor: pointer; width: 100%; max-width: 280px; -webkit-tap-highlight-color: transparent; }
.share-btn.primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
.share-btn.secondary { background: transparent; border: 1px solid rgba(255,255,255,0.2); }
.restart-btn { background: none; border: none; color: #888; font-size: 13px; cursor: pointer; margin-top: 12px; text-decoration: underline; }

@keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
.fade-up { animation: fadeUp 0.5s ease-out forwards; }
.fade-up-delay { animation: fadeUp 0.5s ease-out 0.2s forwards; opacity: 0; }

/* Toast */
.toast { position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%); background: rgba(255,255,255,0.15); backdrop-filter: blur(10px); color: #fff; padding: 12px 24px; border-radius: 20px; font-size: 14px; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 100; }
.toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="screen active" id="screen-dilemma">
  <div class="dilemma-label fade-up">道德困境</div>
  <div class="dilemma-counter fade-up" id="dilemma-counter"></div>
  <div class="dilemma-text fade-up-delay" id="dilemma-text"></div>
  <div class="timer fade-up-delay" id="timer">10</div>
  <div class="choices fade-up-delay">
    <button class="choice-btn" id="choice-a" onclick="choose('A')"></button>
    <button class="choice-btn" id="choice-b" onclick="choose('B')"></button>
  </div>
</div>

<div class="screen" id="screen-reveal">
  <div class="reveal-container">
    <div class="your-choice" id="your-choice"></div>
    <div class="reveal-stat fade-up" id="reveal-stat"></div>
    <div class="reveal-desc" id="reveal-desc"></div>
    <div class="expert-take" id="expert-take"></div>
    <button class="next-btn" onclick="showResult()">看看你是什么类型 →</button>
  </div>
</div>

<div class="screen" id="screen-result">
  <div class="card-wrapper">
    <div class="result-card" id="result-card">
      <div class="card-type-label">你的决策人格</div>
      <div class="card-rarity" id="card-rarity"></div>
      <div class="card-type" id="card-type"></div>
      <div class="card-subtitle" id="card-subtitle"></div>
      <div class="card-desc" id="card-desc"></div>
      <div class="card-color-label" id="card-color-label"></div>
      <div class="card-share-hook" id="card-share-hook"></div>
      <div class="card-footer">你会怎么选？· 道德困境测试</div>
    </div>
    <div class="share-actions">
      <button class="share-btn primary" onclick="saveCard()">📸 保存卡片到相册</button>
      <button class="share-btn secondary" onclick="copyLink()">🔗 复制链接分享</button>
      <button class="restart-btn" onclick="restart()">再测一次</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

let currentDilemma = null, userChoice = null, timerInterval = null, timeLeft = 10;

function init() {
  const p = new URLSearchParams(location.search);
  const dIdx = parseInt(p.get('d')) || Math.floor(Math.random() * dilemmas.length);
  currentDilemma = dilemmas[dIdx % dilemmas.length];
  render();
  startTimer();
  track('view', currentDilemma.id);
}

function render() {
  document.getElementById('dilemma-text').textContent = currentDilemma.text;
  document.getElementById('choice-a').textContent = currentDilemma.optionA;
  document.getElementById('choice-b').textContent = currentDilemma.optionB;
  document.getElementById('dilemma-counter').textContent = `第 ${dilemmas.indexOf(currentDilemma)+1}/${dilemmas.length} 题`;
}

function startTimer() {
  timeLeft = 10;
  const el = document.getElementById('timer');
  el.textContent = '10'; el.style.color = '#ff4444';
  timerInterval = setInterval(() => {
    timeLeft--;
    el.textContent = timeLeft;
    if (timeLeft <= 3) el.style.color = '#ff0000';
    if (timeLeft <= 0) { clearInterval(timerInterval); choose(Math.random()>0.5?'A':'B', true); }
  }, 1000);
}

function choose(opt, timeout=false) {
  if (userChoice) return;
  userChoice = opt;
  clearInterval(timerInterval);
  const r = currentDilemma.revealFormats[opt];
  document.getElementById('your-choice').textContent = timeout ? '⏰ 时间到！系统帮你选了' : `你选择了「${opt==='A'?currentDilemma.optionA:currentDilemma.optionB}」`;
  document.getElementById('reveal-stat').textContent = r.stat;
  document.getElementById('reveal-desc').textContent = r.desc;
  document.getElementById('expert-take').textContent = r.expert;
  switchScreen('screen-reveal');
  track('choose', currentDilemma.id, {opt, timeout, timeLeft});
}

function showResult() {
  const r = userChoice==='A' ? currentDilemma.resultA : currentDilemma.resultB;
  document.getElementById('result-card').style.background = r.bg;
  document.getElementById('card-rarity').textContent = r.rarity;
  document.getElementById('card-type').textContent = '「' + r.type + '」';
  document.getElementById('card-subtitle').textContent = r.subtitle;
  document.getElementById('card-desc').textContent = r.desc;
  document.getElementById('card-color-label').textContent = r.color;
  document.getElementById('card-share-hook').textContent = r.shareHook;
  switchScreen('screen-result');
  track('result_view', currentDilemma.id, {type: r.type});
}

function switchScreen(id) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function saveCard() {
  const card = document.getElementById('result-card');
  if (typeof html2canvas !== 'undefined') {
    html2canvas(card, {backgroundColor: null, scale: 2}).then(canvas => {
      const link = document.createElement('a');
      link.download = '我的决策人格.png';
      link.href = canvas.toDataURL();
      link.click();
      toast('卡片已保存 📸');
    }).catch(() => toast('长按卡片区域即可保存'));
  } else {
    toast('长按卡片区域即可保存图片到相册 📸');
  }
  track('share_save', currentDilemma.id);
}

function copyLink() {
  const url = location.origin + location.pathname + '?d=' + dilemmas.indexOf(currentDilemma);
  const r = userChoice==='A' ? currentDilemma.resultA : currentDilemma.resultB;
  const text = r.shareHook + '\n' + url;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(()=>toast('链接已复制！去分享给朋友吧 ✨'));
  } else {
    prompt('复制分享：', text);
  }
  track('share_copy', currentDilemma.id);
}

function restart() {
  userChoice = null;
  currentDilemma = dilemmas[Math.floor(Math.random() * dilemmas.length)];
  render();
  switchScreen('screen-dilemma');
  startTimer();
  track('restart', currentDilemma.id);
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2000);
}

// Analytics
const _sid = localStorage.getItem('_sid') || (localStorage.setItem('_sid', Math.random().toString(36).slice(2)+Date.now().toString(36)), localStorage.getItem('_sid'));
// Set your Cloudflare Worker URL here after deploying:
// window._analyticsEndpoint = 'https://dilemma-analytics.YOUR.workers.dev/event';

function track(action, did, extra={}) {
  const e = {t:Date.now(), a:action, d:did, ...extra, ua:navigator.userAgent.slice(0,80), sid:_sid, ref:document.referrer.slice(0,120)};
  const log = JSON.parse(localStorage.getItem('_events')||'[]');
  log.push(e); localStorage.setItem('_events', JSON.stringify(log));
  if (window._analyticsEndpoint) {
    try { navigator.sendBeacon(window._analyticsEndpoint, JSON.stringify(e)); } catch(err) {}
  }
}
